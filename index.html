<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindDesk - Chat RH</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #0056b3; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { display: flex; padding: 10px; background: #f0f0f0; border-top: 1px solid #ddd; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background: #0056b3; color: white; border: none; padding: 10px 15px; margin-left: 10px; border-radius: 50%; cursor: pointer; }
        #send-btn:hover { background: #004494; }
        .loading { font-size: 0.8em; color: #888; align-self: flex-start; display: none; margin-top: -5px; margin-left: 10px;}
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Assistente RH - MindDesk</div>
    <div id="messages">
        <div class="message bot-msg">Olá! Sou o assistente virtual da MindDesk. Como posso ajudar com dúvidas de RH hoje?</div>
    </div>
    <div id="loading" class="loading">Digitando...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua dúvida..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // === CONFIGURAÇÕES DO MVP ===
    // ATENÇÃO: No app real, essas chaves NÃO ficam no front-end. O Node.js do Frank deve gerenciar isso. 
    // Colocamos aqui apenas para você conseguir testar o seu microserviço direto do navegador.
    const TENANT_ID = 1; // ID da empresa que cadastramos no teste anterior
    const OPENAI_KEY = "sk-proj-..."; // COLE SUA CHAVE DA OPENAI
    const SUPA_URL = "https://lrhqwmahdqamlhmmcqag.supabase.co";
    const SUPA_KEY = "eyJhb..."; // COLE A SUA SERVICE ROLE KEY GIGANTE AQUI

    const messagesDiv = document.getElementById("messages");
    const userInput = document.getElementById("user-input");
    const loadingDiv = document.getElementById("loading");

    function addMessage(text, isUser) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
        msgDiv.textContent = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, true);
        userInput.value = "";
        loadingDiv.style.display = "block";

        try {
            // AGORA BATEMOS NA PORTA DO FRANK (Node.js) E NÃO MAIS NO PYTHON
            const response = await fetch("http://localhost:3000/chat/perguntar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    query: text,
                    tenant_id: TENANT_ID
                    // AS CHAVES SUMIRAM DAQUI! 🎉 O Node.js que vai injetar elas pelo .env
                })
            });

            if (!response.ok) throw new Error("Falha na comunicação com o servidor Node.js.");

            const data = await response.json();
            addMessage(data.answer, false);
            
        } catch (error) {
            console.error(error);
            addMessage("Desculpe, ocorreu um erro ao processar sua solicitação.", false);
        } finally {
            loadingDiv.style.display = "none";
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
